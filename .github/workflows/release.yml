name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace(/^refs\/tags\//, "");
            const isPrerelease = /(alpha|beta|rc)/i.test(tag);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              draft: true,
              prerelease: isPrerelease,
              body: `Auto-generated draft for ${tag}. Edit before publishing.`
            });
            return data.id;

  bundle:
    name: Bundle (${{ matrix.label }})
    needs: draft-release
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            label: macOS-arm64
            args: "--target aarch64-apple-darwin"
            experimental: false
          - runner: macos-13
            label: macOS-x64
            args: "--target x86_64-apple-darwin"
            experimental: false
          - runner: ubuntu-22.04
            label: Linux-x64
            args: ""
            experimental: true
          - runner: windows-latest
            label: Windows-x64
            args: ""
            experimental: true
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.runner == 'macos-latest' && 'aarch64-apple-darwin' || matrix.runner == 'macos-13' && 'x86_64-apple-darwin' || '' }}
          cache: false
          rustflags: ""

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: npm ci
        run: npm ci

      - name: Bundle Pi runtime
        shell: bash
        run: bash ../scripts/build-pi.sh

      - name: Build & upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing — populated only if the secrets are configured.
          # Without these, the bundle is unsigned and Gatekeeper will warn users on first launch.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app
          releaseId: ${{ needs.draft-release.outputs.release_id }}
          args: ${{ matrix.args }}
