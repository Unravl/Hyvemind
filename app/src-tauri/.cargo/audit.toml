# cargo-audit ignore list
#
# These ignores are reviewed periodically. When a fix becomes available
# upstream, remove the corresponding entry.
#
# All entries below are transitive dependencies of `tauri 2` or `sqlx`.
# None are reachable in our usage paths, and none have an upstream fix.

[advisories]
ignore = [
