name: Bug report
description: Report something that doesn't work as expected.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill in as much as you can.
  - type: input
    id: version
    attributes:
      label: Hyvemind version
      description: From the app's About dialog or `git rev-parse HEAD` if running from source.
      placeholder: "v0.1.0-alpha or commit hash"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "e.g. macOS 15.4, Ubuntu 22.04, Windows 11 23H2"
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What you thought should happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list. The smaller the repro, the faster the fix.
      placeholder: |
        1. Open the app
        2. Go to ...
        3. Click ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        From `~/.hyvemind/debug/` (sessions, reviews, or swarms subdirectories) if you ran with `HYVEMIND_DEBUG=1`.
        **Please scrub any API keys, tokens, or personal info before pasting.**
      render: shell
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or anything else that helps.
