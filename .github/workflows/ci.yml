name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (test + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: false
          rustflags: ""

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Bundle Pi runtime (required by tauri.conf.json externalBin)
        working-directory: ${{ github.workspace }}
        run: bash scripts/build-pi.sh

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # Informational during alpha — clippy still runs and reports lints,
        # but doesn't gate CI. Tighten to `-D warnings` once Nurse and the
        # Swarm autonomy loop stabilise and the existing style nits are
        # addressed.
        continue-on-error: true
        run: cargo clippy --all-targets --all-features

      - name: cargo test
        run: cargo test --all-features

  frontend:
    name: Frontend (test + type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: npm ci
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: vitest
        run: npm test
