name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri-build:
    name: Tauri build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            label: macOS-arm64
            experimental: false
          - runner: macos-13
            label: macOS-x64
            # Marked experimental because macos-13 runners can sit queued for
            # 45+ minutes on free-tier public-repo Actions, blocking the
            # workflow conclusion. The build itself works locally; this just
            # stops a runner-allocation stall from turning the badge red.
            experimental: true
          - runner: ubuntu-22.04
            label: Linux-x64
            experimental: true
          - runner: windows-latest
            label: Windows-x64
            experimental: true
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: npm ci
        run: npm ci

      - name: Bundle Pi runtime
        shell: bash
        run: bash ../scripts/build-pi.sh

      - name: Tauri compile sanity check
        run: npx tauri build --debug --no-bundle
